<body>
<div id="app"></div>

<script>
/* ============ GOOGLE LOGIN CONFIG ============ */
const GOOGLE_CLIENT_ID = "414743630488-uoq9ank3rvphih0pcmpsto2ipjm4ebh4.apps.googleusercontent.com";

function decodeJwt(token){
  try{
    const payload = token.split('.')[1];
    return JSON.parse(decodeURIComponent(atob(payload.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }catch(e){ return null; }
}

function handleGoogleCredential(response){
  const data = decodeJwt(response.credential);
  if(!data || !data.email){ alert('Non sono riuscito a leggere i dati dell\'account Google.'); return; }
  state.user = { email: data.email, full_name: data.name || data.email.split('@')[0], photo_url: data.picture || null };
  save();
  state.profile ? go('home') : go('onboarding');
}

function initGoogleButton(){
  if(!window.google || !google.accounts || !google.accounts.id) return;
  if(GOOGLE_CLIENT_ID.includes('INSERISCI_QUI')) return;
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential });
  const target = document.getElementById('google-btn-slot');
  if(target){
    target.innerHTML = '';
    google.accounts.id.renderButton(target, { theme:'outline', size:'large', width: target.offsetWidth || 360, text:'continue_with', locale:'it' });
  }
}

/* ============ STORAGE HELPERS ============ */
const DB = {
  get(key, def){ try{ const v = localStorage.getItem('convivio_'+key); return v ? JSON.parse(v) : def; }catch(e){ return def; } },
  set(key, val){ localStorage.setItem('convivio_'+key, JSON.stringify(val)); }
};
const uid = () => Math.random().toString(36).substring(2,10);

/* ============ STATE ============ */
let state = {
  route: 'login',
  casaTab: 'spese',
  user: DB.get('user', null),
  profile: DB.get('profile', null),
  expenses: DB.get('expenses', []),
  chores: DB.get('chores', []),
  rules: DB.get('rules', []),
  ob: { step:1, city:'', year:'1° anno — Triennale', universities:[], selectedUni:'', livingMode:'', roomCode:'', habits:{} },
  formOpen: {},
  modal: null,
};

if(state.user && state.profile) state.route = 'home';
else if(state.user && !state.profile) state.route = 'onboarding';

function save(){
  DB.set('user', state.user);
  DB.set('profile', state.profile);
  DB.set('expenses', state.expenses);
  DB.set('chores', state.chores);
  DB.set('rules', state.rules);
}
function go(route){ state.route = route; render(); window.scrollTo(0,0); }
function update(fn){ fn(); render(); }

const YEARS = ["1° anno — Triennale","2° anno — Triennale","3° anno — Triennale","1° anno — Magistrale","2° anno — Magistrale","Dottorato"];
const LIVING_OPTIONS = [
  { id:"search_roommates", emoji:"🔍", label:"Cerco coinquilini", sub:"Voglio trovare persone compatibili con cui vivere" },
  { id:"join_room", emoji:"🔑", label:"Ho un codice stanza", sub:"Entro in una stanza virtuale creata da altri studenti" },
  { id:"solo", emoji:"🙋", label:"Uso l'app da solo/a", sub:"Gestisco le mie spese e faccende in autonomia" },
];
const HABIT_QUESTIONS = [
  { id:"sleep_schedule", emoji:"😴", question:"Qual è il tuo ritmo di sonno?", options:[{value:"mattiniero",label:"Mattiniero",emoji:"🌅"},{value:"flessibile",label:"Flessibile",emoji:"🔄"},{value:"notturno",label:"Notturno",emoji:"🌙"}]},
  { id:"cleanliness", emoji:"🧹", question:"Come sei con la pulizia?", options:[{value:"ordinato",label:"Ordinato",emoji:"✨"},{value:"normale",label:"Normale",emoji:"👌"},{value:"disordinato",label:"Disordinato",emoji:"🛋️"}]},
  { id:"smoking", emoji:"🚬", question:"Fumi?", options:[{value:"no",label:"Non fumo",emoji:"🚭"},{value:"esterno",label:"Fuori casa",emoji:"🚪"},{value:"si",label:"In casa",emoji:"💨"}]},
  { id:"guests", emoji:"👥", question:"Ricevi ospiti?", options:[{value:"raramente",label:"Raramente",emoji:"🏠"},{value:"spesso",label:"Spesso",emoji:"🎉"},{value:"mai",label:"Mai",emoji:"🚫"}]},
  { id:"study_habits", emoji:"📚", question:"Come studi in casa?", options:[{value:"silenzioso",label:"Silenzio",emoji:"🤫"},{value:"bassa_voce",label:"A bassa voce",emoji:"🔉"},{value:"musica",label:"Con musica",emoji:"🎵"}]},
];
const HABIT_LABELS = {
  sleep_schedule:{mattiniero:"Mattiniero",flessibile:"Flessibile",notturno:"Notturno"},
  cleanliness:{ordinato:"Ordinato",normale:"Normale",disordinato:"Disordinato"},
  smoking:{no:"Non fuma",esterno:"Fuori casa",si:"Fuma in casa"},
  guests:{raramente:"Pochi ospiti",spesso:"Spesso ospiti",mai:"Mai ospiti"},
  study_habits:{silenzioso:"Studio silenzioso",bassa_voce:"Studio a bassa voce",musica:"Studio con musica"},
};
const HABIT_EMOJI = { sleep_schedule:"😴", cleanliness:"🧹", smoking:"🚬", guests:"👥", study_habits:"📚" };

const MOCK_ROOMMATES = DB.get('mockRoommates', [
  { id:'m1', university:"Università di Bologna", city:"Bologna", year:"2° anno — Triennale", room_code:"", living_mode:"search_roommates", sleep_schedule:"flessibile", cleanliness:"ordinato", smoking:"no", guests:"raramente", study_habits:"silenzioso" },
  { id:'m2', university:"Alma Mater Studiorum", city:"Bologna", year:"1° anno — Magistrale", room_code:"", living_mode:"search_roommates", sleep_schedule:"notturno", cleanliness:"normale", smoking:"esterno", guests:"spesso", study_habits:"musica" },
  { id:'m3', university:"Università di Bologna", city:"Bologna", year:"3° anno — Triennale", room_code:"", living_mode:"search_roommates", sleep_schedule:"mattiniero", cleanliness:"ordinato", smoking:"no", guests:"raramente", study_habits:"bassa_voce" },
]);
DB.set('mockRoommates', MOCK_ROOMMATES);

function getGreeting(){ const h = new Date().getHours(); if(h<12) return "Buongiorno"; if(h<18) return "Buon pomeriggio"; return "Buonasera"; }
function esc(s){ const d=document.createElement('div'); d.innerText = s ?? ''; return d.innerHTML; }

/* ============ RENDER ROOT ============ */
function render(){
  const app = document.getElementById('app');
  if(state.route === 'login') app.innerHTML = renderAuth('login');
  else if(state.route === 'register') app.innerHTML = renderAuth('register');
  else if(state.route === 'onboarding') app.innerHTML = renderOnboarding();
  else app.innerHTML = renderAppShell();
  if(state.modal) renderModal();
  bindEvents();
  if(state.route === 'login' || state.route === 'register') initGoogleButton();
}

/* ============ AUTH ============ */
function renderAuth(mode){
  return `
  <div class="auth-wrap">
    <div class="logo-row"><div class="logo-box">🏠</div><div class="logo-text">Convivio</div></div>
    <div class="auth-hero">
      <h1>La tua vita da studente, <span class="highlight">senza stress.</span></h1>
      <p>Gestisci casa, spese e trova i coinquilini giusti. In 60 secondi.</p>
    </div>
    <div class="toggle-pill">
      <a data-nav="login" class="${mode==='login'?'active':''}">Accedi</a>
      <a data-nav="register" class="${mode==='register'?'active':''}">Registrati</a>
    </div>
    ${state.authError ? `<div class="error-box">${esc(state.authError)}</div>` : ''}
    <div class="auth-form">
      <input id="auth-email" type="email" class="input-lg" placeholder="Email (usa @studenti... per la verifica)" autocomplete="email">
      <input id="auth-pass" type="password" class="input-lg" placeholder="Password" autocomplete="current-password">
      ${mode==='register' ? `<input id="auth-pass2" type="password" class="input-lg" placeholder="Conferma password" autocomplete="new-password">` : ''}
      <button class="btn-primary" data-action="${mode==='login'?'do-login':'do-register'}">✉️ ${mode==='login'?'Accedi con Email':'Registrati con Email'}</button>
    </div>
    ${mode==='login' ? `<div class="auth-link-right" style="width:100%;max-width:400px;"><a data-nav="_forgot">Password dimenticata?</a></div>` : ''}
    <div class="divider" style="width:100%;max-width:400px;"><div class="line"></div>oppure<div class="line"></div></div>
    ${GOOGLE_CLIENT_ID.includes('INSERISCI_QUI') ? `
      <button class="btn-outline" style="max-width:400px;" data-action="do-google">🔵 Continua con Google</button>
    ` : `<div id="google-btn-slot" style="width:100%;max-width:400px;display:flex;justify-content:center;"></div>`}
    <div class="verified-badge"><span class="check">✓</span> Email istituzionale (@studenti…) = badge Utente Verificato</div>
  </div>`;
}

function doLogin(){
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if(!email || !pass){ state.authError = "Inserisci email e password"; return render(); }
  state.authError = '';
  const name = email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
  state.user = { email, full_name: name };
  save();
  state.profile ? go('home') : go('onboarding');
}
function doRegister(){
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const pass2 = document.getElementById('auth-pass2').value;
  if(!email || !pass){ state.authError = "Inserisci email e password"; return render(); }
  if(pass !== pass2){ state.authError = "Le password non corrispondono"; return render(); }
  state.authError = '';
  const name = email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
  state.user = { email, full_name: name };
  save();
  go('onboarding');
}

/* ============ ONBOARDING ============ */
function renderOnboarding(){
  const ob = state.ob;
  let stepHtml = '';

  if(ob.step === 1){
    stepHtml = `
      <div class="ob-step">
        <div class="ob-emoji">📍</div>
        <h2>In quale città studi?</h2>
        <p>Scrivi la tua città universitaria. Troveremo le università presenti per te.</p>
        <div class="field-group">

        <div class="field-group">
          <label class="field-label">Anno di corso</label>
          <select id="ob-year" class="input-lg">

          <button class="btn-primary btn-next" data-action="ob-next-1">Continua →</button>
        </div>
      </div>`;
  } else if(ob.step === 2){
    stepHtml = `
      <div class="ob-step">
        <div class="ob-emoji">🎓</div>
        <h2>In quale università studi?</h2>
        <p>Abbiamo cercato le università a <b style="color:var(--acc);">${esc(ob.city)}</b>. Seleziona la tua.</p>
        <div>
          ${ob.universities.map(u=>`<button class="uni-card ${ob.selectedUni===u?'selected':''}" data-action="ob-pick-uni" data-uni="${esc(u)}"><span style="font-size:26px;">🏛️</span><span style="font-size:15px;font-weight:600;">${esc(u)}</span></button>`).join('')}
        </div>
        <div class="ob-actions">
          <button class="btn-back" data-action="ob-back">← Indietro</button>
          <button class="btn-primary btn-next" data-action="ob-next-2" ${!ob.selectedUni?'disabled':''}>Continua →</button>
        </div>
      </div>`;
  } else if(ob.step === 3){
    stepHtml = `
      <div class="ob-step">
        <div class="ob-emoji">🏡</div>
        <h2>Come vuoi usare Convivio?</h2>
        <p>Scegli la modalità che fa per te. Potrai cambiarla in seguito.</p>
        <div>
          ${LIVING_OPTIONS.map(o=>`
            <button class="option-card ${ob.livingMode===o.id?'selected':''}" data-action="ob-pick-mode" data-mode="${o.id}">
              <span class="oc-emoji">${o.emoji}</span>
              <div><div class="oc-label">${o.label}</div><div class="oc-sub">${o.sub}</div></div>
            </button>`).join('')}
        </div>
        ${ob.livingMode==='join_room' ? `
          <div class="field-group">
            <label class="field-label">Codice stanza</label>
            <input id="ob-room-code" type="text" class="input-lg" style="text-transform:uppercase;letter-spacing:.2em;text-align:center;font-weight:700;" placeholder="Es. ABC123" value="${esc(ob.roomCode)}">
          </div>` : ''}
        <div class="ob-actions">
          <button class="btn-back" data-action="ob-back">← Indietro</button>
          <button class="btn-primary btn-next" data-action="ob-next-3" ${!ob.livingMode || (ob.livingMode==='join_room' && !ob.roomCode.trim()) ? 'disabled':''}>Continua →</button>
        </div>
      </div>`;
  } else if(ob.step === 4){
    const answered = Object.keys(ob.habits).length;
    stepHtml = `
      <div class="ob-step">
        <div class="ob-emoji">🧩</div>
        <h2>Le tue abitudini</h2>
        <p>Rispondi per trovare i coinquilini più compatibili con te.</p>
        <div style="flex:1;overflow-y:auto;">
          ${HABIT_QUESTIONS.map(q=>`
            <div class="habit-q">
              <div class="habit-q-title">${q.emoji} ${q.question}</div>
              <div class="habit-opts">
                ${q.options.map(o=>`<button class="habit-opt ${ob.habits[q.id]===o.value?'selected':''}" data-action="ob-pick-habit" data-qid="${q.id}" data-val="${o.value}"><span class="ho-emoji">${o.emoji}</span>${o.label}</button>`).join('')}
              </div>
            </div>`).join('')}
        </div>
        <div class="ob-actions">
          <button class="btn-back" data-action="ob-back">← Indietro</button>
          <button class="btn-primary btn-next" data-action="ob-finish" ${answered < HABIT_QUESTIONS.length ? 'disabled':''}>Inizia 🚀</button>
        </div>
      </div>`;
  }

  return `
  <div class="ob-wrap"><div class="ob-inner">
    <div class="ob-top"><div class="logo-box">🏠</div><div class="logo-text">Convivio</div></div>
    <div class="ob-dots">${[1,2,3,4].map(i=>`<div class="ob-dot ${i<=ob.step?'done':''}"></div>`).join('')}</div>
    ${stepHtml}
  </div></div>`;
}

function obNext1(){
  const city = document.getElementById('ob-city').value.trim();
  const year = document.getElementById('ob-year').value;
  if(!city) return;
  state.ob.city = city; state.ob.year = year;
  const base = city.charAt(0).toUpperCase()+city.slice(1).toLowerCase();
  state.ob.universities = [`Università degli Studi di ${base}`, `Politecnico di ${base}`, "Altra università"];
  state.ob.selectedUni = '';
  state.ob.step = 2;
  render();
}
function obPickUni(uni){ state.ob.selectedUni = uni; render(); }
function obNext2(){ if(!state.ob.selectedUni) return; state.ob.step = 3; render(); }
function obPickMode(mode){ state.ob.livingMode = mode; render(); }
function obNext3(){
  const om = state.ob;
  if(!om.livingMode) return;
  if(om.livingMode === 'join_room'){
    const code = document.getElementById('ob-room-code').value.trim();
    if(!code) return;
    om.roomCode = code;
  }
  om.step = 4; render();
}
function obPickHabit(qid, val){ state.ob.habits[qid] = val; render(); }
function obBack(){ state.ob.step = Math.max(1, state.ob.step - 1); render(); }
function obFinish(){
  const om = state.ob;
  const code = om.livingMode === 'join_room' ? om.roomCode.trim().toUpperCase()
             : om.livingMode === 'search_roommates' ? uid().substring(0,6).toUpperCase() : '';
  state.profile = {
    id: uid(), city: om.city, university: om.selectedUni, year: om.year,
    living_mode: om.livingMode, room_code: code, photo_url: null,
    sleep_schedule: om.habits.sleep_schedule, cleanliness: om.habits.cleanliness,
    smoking: om.habits.smoking, guests: om.habits.guests, study_habits: om.habits.study_habits,
  };
  save();
  go('home');
}

/* ============ APP SHELL ============ */
function renderAppShell(){
  const p = state.profile;
  const photo = p && p.photo_url;
  const tabs = [
    { id:'home', emoji:'🏠', label:'Home' },
    { id:'casa', emoji:'🏡', label:'Casa' },
    { id:'coinquilini', emoji:'🔍', label:'Coinquilini' },
    { id:'profilo', emoji:'👤', label:'Profilo' },
  ];
  let content = '';
  if(state.route === 'home') content = renderHome();
  else if(state.route === 'casa') content = renderCasa();
  else if(state.route === 'coinquilini') content = renderCoinquilini();
  else if(state.route === 'profilo') content = renderProfilo();

  return `

      <div class="logo-row"><div class="logo-box">🏠</div><div class="logo-text">Convivio</div></div>

    <div class="app-content">${content}</div>
    <div class="bottom-nav">
      ${tabs.map(t=>`
        <a class="nav-tab ${state.route===t.id?'active':''}" data-nav="${t.id}">
          ${state.route===t.id ? '<div class="nav-indicator"></div>' : ''}
          <span class="nav-emoji">${t.emoji}</span>
          <span class="nav-label">${t.label}</span>
        </a>`).join('')}
    </div>
  </div>`;
}

/* ============ HOME ============ */
function renderHome(){
  const p = state.profile;
  const name = (state.user?.full_name || 'Studente').split(' ')[0];
  const totalExpenses = state.expenses.reduce((s,e)=>s+(e.amount||0),0);
  const pending = state.chores.filter(c=>!c.done);

  return `
    <div class="hero">
      <div class="chip">📍 ${esc(p.city)}</div>
      <h1>${getGreeting()}, ${esc(name)} 👋</h1>

/* CRUD */
function addExpense(){
  const title = document.getElementById('exp-title').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  if(!title || !amount) return;
  state.expenses.unshift({
    id: uid(), title, amount,
    paid_by: document.getElementById('exp-paidby').value.trim() || 'Io',
    split_between: parseInt(document.getElementById('exp-split').value) || 1,
    category: document.getElementById('exp-cat').value.trim(),
    date: new Date().toISOString().split('T')[0],
  });
  state.formOpen.expense = false; save(); render();
}
function delExpense(id){ state.expenses = state.expenses.filter(e=>e.id!==id); save(); render(); }
function addChore(){
  const title = document.getElementById('chore-title').value.trim();
  if(!title) return;
  state.chores.unshift({ id: uid(), title, assigned_to: document.getElementById('chore-assigned').value.trim(), day: document.getElementById('chore-day').value.trim(), done:false });
  state.formOpen.chore = false; save(); render();
}
function toggleChore(id){ const c = state.chores.find(c=>c.id===id); if(c) c.done = !c.done; save(); render(); }
function delChore(id){ state.chores = state.chores.filter(c=>c.id!==id); save(); render(); }
function addRule(){
  const title = document.getElementById('rule-title').value.trim();
  if(!title) return;
  state.rules.unshift({ id: uid(), title, description: document.getElementById('rule-desc').value.trim() });
  state.formOpen.rule = false; save(); render();
}
function delRule(id){ state.rules = state.rules.filter(r=>r.id!==id); save(); render(); }

/* ============ COINQUILINI ============ */
function calcCompat(my, their){
  const HABITS = ['sleep_schedule','cleanliness','smoking','guests','study_habits'];
  let matches=0, total=0;
  HABITS.forEach(h=>{ if(my[h] && their[h]){ total++; if(my[h]===their[h]) matches++; } });
  return total>0 ? Math.round((matches/total)*100) : 0;
}
function matchColor(score){
  if(score>=80) return { bg:'var(--mint)', text:'#000' };
  if(score>=50) return { bg:'rgba(37,99,235,.15)', text:'var(--acc)' };
  return { bg:'var(--s2)', text:'var(--t2)' };
}
function renderCoinquilini(){
  const p = state.profile;
  const modeLabels = { join_room:'Stanza con codice', solo:'Uso in autonomia' };
  if(p.living_mode !== 'search_roommates'){
    return `
    <div class="not-active">
      <div class="na-emoji">🔍</div>
      <h2>Modalità non attiva</h2>
      <p>Sei in modalità <b style="color:var(--t1);">${modeLabels[p.living_mode]||p.living_mode}</b>. Passa a "Cerco coinquilini" per trovare studenti compatibili nella tua città.</p>
      <button class="btn-inline" data-nav="profilo">🔄 Cambia modalità</button>
    </div>`;
  }
  const HABITS = ['sleep_schedule','cleanliness','smoking','guests','study_habits'];
  const others = MOCK_ROOMMATES.filter(r=>r.city.toLowerCase()===p.city.toLowerCase());
  const withScores = others.map(r=>({...r, _score: calcCompat(p, r)})).sort((a,b)=>b._score-a._score);

  return `
  <div class="co-header">
    <div class="chip">📍 ${esc(p.city)}</div>
    <h1>Coinquilini <span class="highlight">vicino a te</span></h1>
    <p>${withScores.length>0 ? `${withScores.length} student${withScores.length===1?'e':'i'} che cercano coinquilini a ${esc(p.city)}` : 'Nessuno studente trovato nella tua città per ora.'}</p>
  </div>
  ${withScores.length===0 ? `<div class="co-empty"><div style="font-size:40px;margin-bottom:12px;">🔍</div><p style="max-width:280px;margin:0 auto;">Non ci sono ancora studenti in modalità "Cerco coinquilini" a ${esc(p.city)}. Torna presto a controllare!</p></div>` : `
  <div style="padding:16px 20px;">
    ${withScores.map(rm=>{
      const mc = matchColor(rm._score);
      const matching = HABITS.filter(h=>p[h] && rm[h] && p[h]===rm[h]);
      const different = HABITS.filter(h=>p[h] && rm[h] && p[h]!==rm[h]);
      return `
      <div class="roommate-card">
        <div class="rm-top">
          <div class="rm-avatar">🎓</div>
          <div class="rm-body">
            <div class="rm-uni">${esc(rm.university)}</div>
            <div class="rm-year">${esc(rm.year)}</div>
            ${rm.room_code?`<div class="rm-code">🔑 ${esc(rm.room_code)}</div>`:''}
          </div>
          <div class="match-badge" style="background:${mc.bg};color:${mc.text};">${rm._score}% match</div>
        </div>
        ${matching.length>0?`<div class="habit-tags">${matching.map(h=>`<span class="habit-tag match">${HABIT_EMOJI[h]} ${HABIT_LABELS[h][rm[h]]}</span>`).join('')}</div>`:''}
        ${different.length>0?`<div class="habit-tags">${different.map(h=>`<span class="habit-tag diff">${HABIT_EMOJI[h]} ${HABIT_LABELS[h][rm[h]]}</span>`).join('')}</div>`:''}
      </div>`;
    }).join('')}
  </div>`}`;
}

function handlePhoto(e){
  const file = e.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => { state.profile.photo_url = reader.result; save(); render(); };
  reader.readAsDataURL(file);
}
function logout(){
  state.user = null; state.profile = null;
  localStorage.removeItem('convivio_user'); localStorage.removeItem('convivio_profile');
  go('login');
}

      <div class="field-group"><label class="field-label">Università</label><input id="edit-uni" class="input-lg" value="${esc(p.university)}"></div>
      <div class="field-group"><label class="field-label">Anno di corso</label>
        <select id="edit-year" class="input-lg">${YEARS.map(y=>`<option value="${y}" ${y===p.year?'selected':''}>${y}</option>`).join('')}</select>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" data-action="close-modal">Annulla</button>
        <button class="btn-save" data-action="save-edit">Salva</button>
      </div>`;
  } else if(state.modal === 'delete'){
    inner = `
      <div class="modal-title">Elimina account</div>
      <p style="font-size:14px;color:var(--t2);margin-bottom:20px;">Questa azione è irreversibile: tutti i tuoi dati (profilo, spese, faccende, regole) verranno eliminati definitivamente.</p>
      <div class="form-actions">
        <button class="btn-cancel" data-action="close-modal">Annulla</button>
        <button class="btn-save" style="background:var(--err);" data-action="confirm-delete">Elimina definitivamente</button>
      </div>`;
  }

  overlay.innerHTML = `<div class="modal-sheet" style="position:relative;">${inner}</div>`;
  document.getElementById('app').appendChild(overlay);
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeModal(); });
}
function closeModal(){ state.modal = null; render(); }
function openModal(name){ state.modal = name; render(); }
function setMode(mode){ state.profile.living_mode = mode; save(); closeModal(); }
function saveEdit(){
  state.profile.city = document.getElementById('edit-city').value.trim() || state.profile.city;
  state.profile.university = document.getElementById('edit-uni').value.trim() || state.profile.university;
  state.profile.year = document.getElementById('edit-year').value;
  save(); closeModal();
}
function confirmDelete(){
  localStorage.removeItem('convivio_user'); localStorage.removeItem('convivio_profile');
  localStorage.removeItem('convivio_expenses'); localStorage.removeItem('convivio_chores'); localStorage.removeItem('convivio_rules');
  state.user = null; state.profile = null; state.expenses = []; state.chores = []; state.rules = [];
  go('login');
}

/* ============ EVENT BINDING ============ */
function bindEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const target = el.getAttribute('data-nav');
      if(target === '_forgot'){ alert('Funzione demo: in produzione qui parte il flusso di reset password via email.'); return; }
      if(target === 'casa'){ state.casaTab = el.getAttribute('data-tab') || 'spese'; }
      go(target);
    });
  });
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      const action = el.getAttribute('data-action');
      const map = {
        'do-login': doLogin, 'do-register': doRegister,
        'do-google': ()=>alert('Per attivare il login Google reale, inserisci il tuo Client ID nella costante GOOGLE_CLIENT_ID in cima allo script.'),
        'ob-next-1': obNext1, 'ob-next-2': obNext2, 'ob-next-3': obNext3,
        'ob-back': obBack, 'ob-finish': obFinish,
        'ob-pick-uni': ()=>obPickUni(el.getAttribute('data-uni')),
        'ob-pick-mode': ()=>obPickMode(el.getAttribute('data-mode')),
        'ob-pick-habit': ()=>obPickHabit(el.getAttribute('data-qid'), el.getAttribute('data-val')),
        'casa-tab': ()=>{ state.casaTab = el.getAttribute('data-tab'); render(); },
        'toggle-form': ()=>{ const f = el.getAttribute('data-form'); state.formOpen[f] = !state.formOpen[f]; render(); },
        'add-expense': addExpense, 'del-expense': ()=>delExpense(el.getAttribute('data-id')),
        'add-chore': addChore, 'toggle-chore': ()=>toggleChore(el.getAttribute('data-id')), 'del-chore': ()=>delChore(el.getAttribute('data-id')),
        'add-rule': addRule, 'del-rule': ()=>delRule(el.getAttribute('data-id')),
        'open-edit': ()=>openModal('edit'), 'open-mode': ()=>openModal('mode'), 'open-delete': ()=>openModal('delete'),
        'close-modal': closeModal, 'set-mode': ()=>setMode(el.getAttribute('data-mode')),
        'save-edit': saveEdit, 'confirm-delete': confirmDelete,
        'logout': logout,
      };
      if(map[action]) map[action]();
    });
  });
  const photoInput = document.getElementById('photo-input');
  if(photoInput) photoInput.addEventListener('change', handlePhoto);
}

render();
</script>
<script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
 
// --- 1. INCOLLA QUI LA TUA CONFIGURAZIONE FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyCg4RgWKVER2-gZJNi7xvV0yEk60JC1HX4",
  authDomain: "convivio-f3fb8.firebaseapp.com",
  projectId: "convivio-f3fb8",
   storageBucket: "convivio-f3fb8.firebasestorage.app",
  messagingSenderId: "430002485006",
  appId: "1:430002485006:web:f1ced519aaf2fde082495f",
  measurementId: "G-PN1R2BGPCD"
};
 
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
 
// --- 2. LOGIN CON GOOGLE ---
// Collega questa funzione al tuo pulsante "Accedi con Google" esistente
export async function handleGoogleSignIn() {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    await registraOAggiornaUtente(user);
    return user;
  } catch (err) {
    console.error("Errore login Google:", err);
    throw err;
  }
}
 
// --- 3. SALVA/AGGIORNA IL PROFILO UTENTE SU FIRESTORE ---
async function registraOAggiornaUtente(user) {
  const userRef = doc(db, "users", user.uid);
  const existing = await getDoc(userRef);
 
  const datiBase = {
    nome: user.displayName || "",
    email: user.email || "",
    foto: user.photoURL || "",
    ultimoAccesso: serverTimestamp()
  };
 
  if (!existing.exists()) {
    // Prima registrazione: aggiungiamo la data di iscrizione, una volta sola
    datiBase.dataRegistrazione = serverTimestamp();
    datiBase.stato = "nuovo";
  }
 
  await setDoc(userRef, datiBase, { merge: true });
}
 
// --- 4. SALVA DATI AGGIUNTIVI DI ONBOARDING (città, università, preferenze) ---
// Chiamala quando l'utente completa il form di profilo/matching che hai già in Convivio
export async function saveOnboardingData(uid, { citta, universita, preferenze }) {
  const userRef = doc(db, "users", uid);
  await setDoc(
    userRef,
    {
      citta: citta || null,
      universita: universita || null,
      preferenze: preferenze || null,
      onboardingCompletato: true
    },
    { merge: true }
  );
}
 
// --- 5. TIENE TRACCIA DI CHI È LOGGATO ORA (facoltativo, utile per la UI) ---
export function ascoltaStatoAuth(callback) {
  onAuthStateChanged(auth, (user) => {
    callback(user); // user è null se nessuno è loggato
  });
}
 
// --- 6. LOGOUT ---
export async function handleSignOut() {
  await signOut(auth);
}

ascoltaStatoAuth();
